<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Life Upgrade Simulator</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #0d0d12;
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.15) 0%, transparent 40%),
                linear-gradient(rgba(13, 13, 18, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13, 13, 18, 0.8) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.3;
        }
        /* === CRT Monitor Effect === */
        
        /* Main CRT container - applies barrel distortion via border-radius trick */
        #root {
            filter: contrast(1.2) brightness(1.2) saturate(1.15);
            animation: crt-flicker 0.08s infinite alternate;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }
        
        /* Random flicker - subtle brightness jitter */
        @keyframes crt-flicker {
            0% { filter: contrast(1.2) brightness(1.2) saturate(1.15); }
            25% { filter: contrast(1.18) brightness(1.18) saturate(1.15); }
            50% { filter: contrast(1.22) brightness(1.25) saturate(1.18); }
            75% { filter: contrast(1.17) brightness(1.2) saturate(1.14); }
            100% { filter: contrast(1.2) brightness(1.28) saturate(1.15); }
        }

        /* Phosphor scanlines - tight horizontal lines like real CRT */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.12) 0px,
                    rgba(0, 0, 0, 0.12) 1px,
                    transparent 1px,
                    transparent 3px
                );
        }

        /* RGB sub-pixel columns (color separation) */
        .crt-rgb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 0, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 1px,
                rgba(0, 0, 255, 0.03) 2px,
                transparent 3px
            );
            background-size: 3px 100%;
            mix-blend-mode: screen;
        }

        /* Moving noise/refresh line */
        .crt-scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(
                to bottom, 
                transparent, 
                rgba(150, 230, 255, 0.12) 30%,
                rgba(150, 230, 255, 0.18) 50%,
                rgba(150, 230, 255, 0.12) 70%,
                transparent
            );
            pointer-events: none;
            z-index: 10000;
            animation: scanline-move 4s linear infinite;
        }
        .crt-scanline::after {
            content: "";
            position: absolute;
            top: 6px;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to bottom, rgba(150, 230, 255, 0.05), transparent);
            pointer-events: none;
        }
        @keyframes scanline-move {
            0% { transform: translateY(-80px); }
            100% { transform: translateY(calc(100vh + 80px)); }
        }
        
        /* Secondary scanline - slower, wider band for realism */
        .crt-scanline-slow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, transparent, rgba(100, 200, 255, 0.03), transparent);
            pointer-events: none;
            z-index: 10000;
            animation: scanline-slow 8s linear infinite;
            opacity: 0.7;
        }
        @keyframes scanline-slow {
            0% { transform: translateY(-200px); }
            100% { transform: translateY(calc(100vh + 200px)); }
        }

        /* Heavy vignette - dark rounded corners like real CRT bezel */
        .fisheye-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            box-shadow: 
                inset 0 0 60px 10px rgba(0, 0, 0, 0.6),
                inset 0 0 150px 30px rgba(0, 0, 0, 0.3);
            border-radius: 18px;
        }

        /* CRT edge warp simulation - rounded inner glow */
        .crt-edge-warp {
            position: fixed;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            pointer-events: none;
            z-index: 9997;
            border: 3px solid rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            box-shadow: 
                inset 0 0 40px rgba(100, 200, 255, 0.1),
                0 0 20px rgba(100, 200, 255, 0.1);
        }

        /* Random horizontal noise glitch */
        .crt-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10001;
            opacity: 0;
            animation: noise-flicker 0.15s step-end infinite;
        }
        .crt-noise::before {
            content: "";
            position: absolute;
            top: 0;
            left: -5%;
            width: 110%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            animation: noise-line 0.1s step-end infinite;
        }
        @keyframes noise-flicker {
            0%, 93% { opacity: 0; }
            94% { opacity: 1; }
            96% { opacity: 0; }
            97% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes noise-line {
            0% { top: 15%; }
            10% { top: 45%; }
            20% { top: 72%; }
            30% { top: 8%; }
            40% { top: 55%; }
            50% { top: 33%; }
            60% { top: 88%; }
            70% { top: 20%; }
            80% { top: 60%; }
            90% { top: 40%; }
            100% { top: 75%; }
        }

        /* Chromatic aberration for text */
        .chromatic-aberration {
            text-shadow: 
                2px 0 2px rgba(255, 50, 50, 0.5), 
                -2px 0 2px rgba(50, 150, 255, 0.5),
                0 0 8px rgba(255, 255, 255, 0.2);
        }
        .chromatic-aberration img {
            filter: drop-shadow(2px 0 1px rgba(255, 50, 50, 0.3)) drop-shadow(-2px 0 1px rgba(50, 150, 255, 0.3)) brightness(1.1);
            position: relative;
            z-index: 10;
        }

        /* Occasional big flicker glitch */
        @keyframes big-glitch {
            0%, 98.5% { opacity: 1; transform: none; }
            98.6% { opacity: 0.85; transform: translateX(3px); }
            98.8% { opacity: 1; transform: translateX(-2px) skewX(0.5deg); }
            99% { opacity: 0.9; transform: translateX(1px); }
            99.5% { opacity: 1; transform: none; }
        }
        #root > div {
            animation: big-glitch 12s infinite;
        }

        /* TV Screen Turn On/Off Transitions */
        .tv-screen-on {
            animation: tv-on 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards !important;
            transform-origin: center !important;
        }
        .tv-screen-off {
            animation: tv-off 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards !important;
            transform-origin: center !important;
        }

        @keyframes tv-on {
            0% {
                transform: scale(1, 0.002);
                opacity: 0;
                filter: brightness(3);
            }
            20% {
                transform: scale(1, 0.002);
                opacity: 1;
                filter: brightness(3);
            }
            100% {
                transform: scale(1, 1);
                opacity: 1;
                filter: brightness(1.15);
            }
        }

        @keyframes tv-off {
            0% { transform: scaleY(1) scaleX(1); opacity: 1; filter: brightness(1.15); }
            50% { transform: scaleY(0.005) scaleX(1); opacity: 1; filter: brightness(3); }
            100% { transform: scaleY(0.005) scaleX(0); opacity: 0; filter: brightness(3); }
        }

        @keyframes loading-bar {
            0% { width: 0%; transform: translateX(-100%); }
            50% { width: 100%; transform: translateX(0); }
            100% { width: 0%; transform: translateX(100%); }
        }

        .font-game { font-family: 'Fredoka One', cursive; }
        .glass-light {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .pill-button {
            transition: transform 0.1s active;
        }
        .pill-button:active {
            transform: scale(0.95);
        }
        .arc-container {
            position: relative;
            width: 100px;
            height: 50px;
            overflow: hidden;
        }
        .arc-svg {
            transform: rotate(-180deg);
            transform-origin: center;
        }
        .animate-slide-up {
            animation: slide-up 0.3s ease-out;
        }
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-bounce-in {
            animation: bounce-in 0.8s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .animate-fade-out-left {
            animation: fadeOutLeft 1s ease-in forwards;
        }
        .animate-zoom-in-rotate {
            animation: zoomInRotate 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s both;
        }
        .animate-slide-up-fade {
            animation: slideUpFade 0.8s ease-out 1s both;
        }
        .animate-fade-in-delayed {
            animation: fadeIn 0.5s ease-out 1.5s both;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeOutLeft {
            0% { transform: translateX(0) scale(0.9); opacity: 0.5; }
            100% { transform: translateX(-50px) scale(0.7); opacity: 0; }
        }
        @keyframes zoomInRotate {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes slideUpFade {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-float-up {
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
        .animate-bounce-up {
            animation: bounceUp 1s ease-out forwards;
        }
        @keyframes bounceUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-10px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-30px) scale(1); opacity: 0; }
        }
        /* ===== Gacha Skin Reveal Animations ===== */
        @keyframes gacha-beam {
            0% { transform: scaleY(0); opacity: 0; }
            15% { transform: scaleY(1); opacity: 1; }
            85% { transform: scaleY(1); opacity: 1; }
            100% { transform: scaleY(0); opacity: 0; }
        }
        @keyframes gacha-flash {
            0% { opacity: 0; }
            20% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes gacha-card-enter {
            0% { transform: scale(0) rotateY(180deg); opacity: 0; filter: brightness(3); }
            50% { transform: scale(1.15) rotateY(90deg); opacity: 1; filter: brightness(2); }
            75% { transform: scale(1.05) rotateY(20deg); filter: brightness(1.3); }
            100% { transform: scale(1) rotateY(0deg); filter: brightness(1); }
        }
        @keyframes gacha-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes gacha-ring-expand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }
        @keyframes gacha-particle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes gacha-theme-text {
            0% { transform: scale(0.3) translateY(20px); opacity: 0; letter-spacing: 0.5em; }
            60% { transform: scale(1.1) translateY(-5px); opacity: 1; letter-spacing: 0.15em; }
            100% { transform: scale(1) translateY(0); opacity: 1; letter-spacing: 0.1em; }
        }
        @keyframes gacha-states-in {
            0% { transform: translateY(40px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes gacha-bg-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-gacha-beam { animation: gacha-beam 1.5s ease-in-out forwards; }
        .animate-gacha-flash { animation: gacha-flash 0.6s ease-out forwards; }
        .animate-gacha-card { animation: gacha-card-enter 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-gacha-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 200% 100%;
            animation: gacha-shimmer 2s linear infinite;
        }
        .animate-gacha-ring { animation: gacha-ring-expand 1s ease-out forwards; }
        .animate-gacha-theme { animation: gacha-theme-text 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-gacha-states { animation: gacha-states-in 0.6s ease-out forwards; }
        .animate-gacha-bg-pulse { animation: gacha-bg-pulse 2s ease-in-out infinite; }

        /* Custom Scrollbar - Cyberpunk CRT style */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(59, 130, 246, 0.4) transparent;
        }
        *::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.5), rgba(147, 51, 234, 0.5));
            border-radius: 10px;
            box-shadow: 0 0 6px rgba(59, 130, 246, 0.3);
        }
        *::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.8), rgba(147, 51, 234, 0.8));
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        *::-webkit-scrollbar-corner {
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
